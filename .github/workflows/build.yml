name: Build Release APK with Embedded FFmpeg

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Advanced Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev lzip gawk libc6-dev-i386

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade "buildozer>=1.5.0" "cython<3.0.0" virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create Keystore
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias ms_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=ms, OU=Dev, O=MyCompany, L=Khartoum, ST=Khartoum, C=SD" \
            -storepass mypassword123 -keypass mypassword123

      - name: Inject Absolute Keystore Path into Buildozer Spec
        run: |
          sed -i 's|.*android.keystore\s*=.*|android.keystore = ${{ github.workspace }}/release.keystore|' buildozer.spec
          sed -i 's|.*android.keystore_passwd\s*=.*|android.keystore_passwd = mypassword123|' buildozer.spec
          sed -i 's|.*android.keyalias\s*=.*|android.keyalias = ms_alias|' buildozer.spec
          sed -i 's|.*android.keyalias_passwd\s*=.*|android.keyalias_passwd = mypassword123|' buildozer.spec

      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android release
        env:
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: mypassword123
          P4A_RELEASE_KEYALIAS: ms_alias
          P4A_RELEASE_KEYALIAS_PASSWD: mypassword123

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyena1-Release-APK
          path: bin/*.apk
